<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AGP Intelligence{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --accent:   #00c2ff;
      --accent2:  #7c3aed;
      --card-bg:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --bg:       #0d1117;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────── */
    .top-nav {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: .9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .brand {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: .5px;
    }
    .brand i { margin-right: .4rem; }
    .nav-meta { color: #484f58; font-size: .8rem; }

    /* ── Cards ───────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .card-header {
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--border);
      padding: .9rem 1.5rem;
      border-radius: 14px 14px 0 0 !important;
      font-weight: 700;
      font-size: .95rem;
    }
    .card-body { padding: 1.5rem; }

    /* ── Stat chips ──────────────────────── */
    .stat-chip {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.4rem;
      text-align: center;
      min-width: 100px;
    }
    .stat-num {
      font-size: 1.9rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }
    .stat-lbl {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-top: .3rem;
    }

    /* ── Tags / badges ───────────────────── */
    .tag {
      display: inline-block;
      padding: .22rem .6rem;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      margin: 2px;
    }
    .t-color   { background:#1c2e1c; color:#56d364; border:1px solid #2ea043; }
    .t-formula { background:#1c2340; color:#79c0ff; border:1px solid #1f6feb; }
    .t-pieza   { background:#2d1f3d; color:#d2a8ff; border:1px solid #8957e5; }
    .t-franja  { background:#2d2416; color:#e3b341; border:1px solid #9e6a03; }
    .t-neutral { background:#21262d; color:#e6edf3; border:1px solid #30363d; }

    /* ── Search ──────────────────────────── */
    .search-box {
      background: var(--card-bg);
      border: 2px solid var(--border);
      color: var(--text);
      border-radius: 12px 0 0 12px;
      font-size: 1.05rem;
      padding: .7rem 1.1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0,194,255,.12);
      background: var(--card-bg);
      color: var(--text);
    }
    .search-box::placeholder { color: #484f58; }
    .btn-go {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 0 12px 12px 0;
      padding: .7rem 1.4rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-go:hover { background: #00a8d8; }

    /* ── Alert ───────────────────────────── */
    .alert-err {
      background: #2d1f1f;
      border: 1px solid #f85149;
      color: #ffa198;
      border-radius: 12px;
      padding: .9rem 1.2rem;
    }

    /* ── Misc ────────────────────────────── */
    .section-label {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 700;
    }
    .divider { border-color: #21262d; }
    .back-link { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .zfer-hero { font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
    .desc-text { font-size: 1.1rem; color: var(--text); font-weight: 600; }
    .attr-row { border-bottom: 1px solid #1c2128; padding: .6rem 0; }
    .attr-row:last-child { border-bottom: none; }
    .attr-key { color: var(--muted); font-size: .85rem; }
    .market-tr:hover td { background: rgba(255,255,255,.025); }
    .pct-bar-wrap { width: 80px; background: #21262d; border-radius: 4px; height: 6px; display:inline-block; vertical-align:middle; }
    .pct-bar { height: 6px; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    footer { color: #484f58; font-size: .78rem; border-top: 1px solid #21262d; }
  </style>
</head>
<body>

<nav class="top-nav">
  <a class="brand" href="/"><i class="bi bi-grid-3x3-gap-fill"></i>AGP Intelligence</a>
  <div class="d-flex align-items-center gap-3">
    <a href="/explorar" style="color:var(--muted); font-size:.85rem; text-decoration:none; display:flex; align-items:center; gap:.35rem; transition:color .15s;"
       onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
      <i class="bi bi-funnel-fill"></i>Explorador
    </a>
    <span class="nav-meta"><i class="bi bi-database me-1"></i>DB_COL_SAP &nbsp;·&nbsp; Centro CO01</span>
  </div>
</nav>

<div class="container-fluid py-4 px-3 px-md-4" style="max-width:1380px;">
  {% block content %}{% endblock %}
</div>

<footer class="text-center py-3 mt-4">
  AGP Glass — Colombia &nbsp;·&nbsp; MODULO 5 &nbsp;·&nbsp; 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
